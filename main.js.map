<div class="wrapperCustome">
<div class="col-sm-4 float-left">
<div class="leftSideBar">
    <div class="sideBarInf"><button routerLinkActive="true" routerLink="/publisher/edit" class="editeBtn"><i class="fa fa-edit"></i>Edit</button>
      <div class="profilePic"><img [src]="profile" alt=""/></div>
      <div class="nameInfo">
    <h4>{{name}}</h4>
    <a href="mailto:{{email}}"><i class="fa fa-envelope"></i><span>{{email}}</span></a><br>
    <a href="tel:{{p_phone}}"><i class="fa fa-phone"></i><span>{{p_phone}}</span></a><br>
    <a href="#"><p><span> Address:</span> {{p_street}} {{p_city}}-{{p_pin}}. <br> {{p_state}}, {{p_country}}</p></a>
  </div>  
    </div>
      
  <div class="leftSideNav">
      <div class="leftBottomImg leftNavSec">
      <ul>
      <li class="{{dashboard_show}}"><a (click)="make_active_db()"routerLinkActive="true" routerLink="/publisher/publisher-dashboard"><i class="fa fa-tachometer" aria-hidden="true"></i> Dashboard</a></li>
      <li class="{{upload_show}}"><a (click)="make_active_up()" routerLinkActive="true" routerLink="/publisher/ebookupload"><i class="fa fa-upload" aria-hidden="true"></i> Upload E Book</a></li>
      <li class="{{list_show}}"><a (click)="make_active_list()" routerLinkActive="true" routerLink="/publisher/book-list"><i class="fa fa-list" aria-hidden="true"></i> List of Books</a></li>
      <li  ><a href="#"><i class="fa fa-file-text-o" aria-hidden="true"></i> Active Pages</a></li>
      <li ><a href="#"><i class="fa fa-history" aria-hidden="true"></i> Report / Payment History</a></li>
      </ul>
      </div> 
  </div>
      </div></div>
  </div>
