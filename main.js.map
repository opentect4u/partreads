<html>
<body>

  <app-userheader></app-userheader>
    <div class="bodyContainerLogin">
            
        <div class="loginWraper" style="max-width: 411px; height: 500px; margin: 0 auto; background: rgba(255, 255, 255, 0.8); border-radius: 5px; padding: 38px 9px 12px 9px;">
        <div class="col-sm-12">
          <div>{{invalid}}</div>
            <h1>User Sign Up</h1>
        <div class="form-group">
        <label class="inputWraper"><i class="fa fa-user" aria-hidden="true"></i>
    <input id="uname" type="type" class="form-control" placeholder="Name" required #u_name></label>
    <small class="text-danger">{{check_name}}</small>
      </div>
            <div class="form-group">
        <label class="inputWraper"><i class="fa fa-envelope-o" aria-hidden="true"></i>
    <input id="uemail" type="email" class="form-control" placeholder="Email" required #u_email (change)="check_valid_email($event)"></label>
    <small class="text-danger">{{check_email}}</small>   
    <small class="text-danger">{{confirm_email}}</small>  
  </div>
            <div class="form-group">
        <label class="inputWraper"><i class="fa fa-lock" aria-hidden="true"></i>
    <input  id="passwd" type="password" class="form-control" placeholder="Password" required #u_pass (change)="show_input_user($event)" (keyup)="check_valid($event)"><span id="iconshow" style="z-index: 9999;
    position: absolute;
    top: 5%;
    right: 40px;" class="p-viewer">
      <i id="eye" class="fa fa-eye-slash" aria-hidden="true" (click)="show_hide_pass()"></i>
    </span></label>
    <small class="text-danger">{{check_pass}}</small>   
    <small class="text-danger">{{pass_message}}</small>   
  </div>
            <div class="form-group">
        <label class="inputWraper"><i class="fa fa-lock" aria-hidden="true"></i>
    <input  id="conf_passwd" type="password" class="form-control" placeholder="Confirm Password" required (keyup)="confirm_pass_user($event)"><span id="iconshow" style="z-index: 9999;
    position: absolute;
    top: 5%;
    right: 40px;" class="p-viewer">
      <i id="eye_conf" class="fa fa-eye-slash" aria-hidden="true" (click)="show_hide_conf()"></i>
    </span></label>
    <small class="text-danger">{{confirm_message}}</small>   
</div>
    
            <div class="checkBoxCustomeMain">
                <label class="checkBoxCustom">
        <input type="checkbox" checked="checked">
        <span class="checkmarkText"></span>
        </label>
                <a href="#">Terms &amp; Condition Apply</a></div>
            
    <div class="form-group">
        
    <input type="submit" class="btn btnRed widthFull" value="Sign up now" (click)="u_register(u_name.value,u_email.value,u_pass.value)">
    <br><br><br>  </div>
    
        </div>
        </div>
       
        
    </div>
    
   <app-site-footer> </app-site-footer>
   
        
    </body>
    </html>
