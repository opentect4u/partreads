<div class="col-sm-4 float-left">
    <div class="leftSideBar">
      <div class="sideBarInf" ><button routerLinkActive="true" routerLink="/user/edit-user" class="editeBtn"><i class="fa fa-edit"></i>Edit</button>
        <div class="profilePic"><img [src]="profile" alt=""/></div>
        <div class="nameInfo">
      <h4>{{name}}</h4>
      <a href="mailto:{{email}}"><i class="fa fa-envelope"></i><span>{{email}}</span></a><br>
      <a href="tel:{{p_phone}}"><i class="fa fa-phone"></i><span>{{p_phone}}</span></a><br>
      <a ><p><span> Address:</span> {{p_street}} {{p_city}} - {{p_pin}}. <br> {{p_state}}, {{p_country}}</p></a>
    </div>  
      </div>
        
    <div class="leftSideNav">
        <div class="leftBottomImg leftNavSec">
        <ul>
          <li class="{{dashboard_show}}"><a (click)="make_active_db()" routerLinkActive="true" routerLink="/user/user_dashboard"><i class="fa fa-tachometer" aria-hidden="true"></i> Dashboard</a></li>
        <li class="{{notif_show}}"><a  (click)="make_active_notif()" routerLinkActive="true" routerLink="/user/notifications"><i class="fa fa-bell" aria-hidden="true"></i>  Notification</a></li>
        <li class="{{history_show}}"><a (click)="make_active_hist()" routerLinkActive="true" routerLink="/user/order_history"><i class="fa fa-history" aria-hidden="true"></i> Order History</a></li>
        <li class="{{list_show}}"><a (click)="make_active_list()" routerLinkActive="true" routerLink="/user/purchaselist"><i class="fa fa-shopping-cart" aria-hidden="true"></i> Purchase List</a></li>
        </ul>
        </div>
    </div>
        
    </div>
    </div>
