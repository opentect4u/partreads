<html>
<body>

   <app-userheader></app-userheader>
        
    
    <div class="bodyContainerLogin">
            
        <div class="loginWraper" style="max-width: 411px; height: 411px; margin: 0 auto; background: rgba(255, 255, 255, 0.8); border-radius: 5px; padding: 38px 9px 12px 9px;">
        <div class="col-sm-12">
          <div>{{invalid}}</div>
            <h1>User Login</h1>
            
        <div class="form-group">
        <label class="inputWraper"><i class="fa fa-envelope-o" aria-hidden="true"></i>
    <input type="email" class="form-control" placeholder="Email" #user_email (change)="check_valid_email($event)"></label>
    <small class="text-danger">{{confirm_email}}</small>
    <small class="text-danger">{{check_name}}</small>
      </div>
            <div class="form-group">
        <label class="inputWraper"><i class="fa fa-lock" aria-hidden="true"></i>
    <input id="passwd" type="password" class="form-control" placeholder="Password" #user_password><span id="iconshow" style="z-index: 9999;
	position: absolute;
	top: 5%;
	right: 40px;" class="p-viewer">
    <i id="eye" class="fa fa-eye-slash" aria-hidden="true" (click)="show_hide()"></i>
  </span></label>
    <small class="text-danger">{{check_email}}</small>
      </div>
    
            
            
            <div class="checkBoxCustomeMain">
                <label class="checkBoxCustom">
        <input type="checkbox" checked="checked">
        <span class="checkmarkText"></span>
        </label>Remember</div>
            
    <div class="form-group">
        
    <input type="submit" class="btn btnRed widthFull" value="LOGIN" (click)="u_login(user_email.value,user_password.value)">
      </div>
            
        <p>Not a member? <a routerLinkActive="true" routerLink="/user/userreg">Sign up now</a></p>
            
        </div>
        </div>
        
    </div>
    
    <app-site-footer></app-site-footer>
        
        
    </body>
    </html>
