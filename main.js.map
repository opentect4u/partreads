                <div class="bookDetails" *ngFor="let x of books">
                    <div class="bookLeftImg">
                        <div class="bookImgFull"><img src="{{x.book_image_path}}" alt="" /></div>
                        <a href="#">Priview Index</a>
                    </div>

                    <div class="bookRightDetail">
                        <h2>{{x.book_name}}</h2>
                        <h3>Description</h3>
                        <p>{{x.about_book}}</p>
                        <p class="productInfo"><strong>ISBN Number:</strong> {{x.isbn_no}}<br>

                            <strong>Author Name:</strong> {{x.author_name}}<br>

                            <strong>Published by:</strong> {{x.publisher_name}}<br>

                            <span class="price">Per Page: <i class="fa fa-inr" aria-hidden="true"></i>
                                {{x.price}}</span>
                        </p>

                        <div class="pageCount">
                            <label class="title">Page Number</label> <label class="inputField"><input type="text"
                                    placeholder="0" class="form-control"></label>
                            <label class="title">to</label> <label class="inputField"><input type="text" placeholder="0"
                                    class="form-control"></label>
                        </div>

                        <button type="button" class="buyNowBtn">Buy Now</button>
                    </div>
