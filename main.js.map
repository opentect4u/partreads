      <app-site-side-bar></app-site-side-bar>
      <div class="col-sm-8 float-left">
        <div class="rightSection">

          <h1>List Of Book Upload</h1>
          <table class="table">
            <thead class="tableSeeGreenHead">
              <tr>
                <th scope="col">#</th>
                <th scope="col">Thumbnail</th>
                <th scope="col">Admin Review</th>
                <th scope="col">Book Name</th>
                <th scope="col">ISBN Number</th>
                <th scope="col">Price</th>
                <th scope="col">Status</th>
                <th scope="col">Action</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let x of category;index as i">
                <th scope="row">{{i+1}}</th>
                <td>
                  <!-- <div class="tableThumbnail"><a [href]="x.full_book_path" target="_blank" ><img -->
                  <!-- [src]="x.book_image_path" alt="" /></a></div> -->
                  <div class="tableThumbnail"><a (click)="showbookname(x.book_name,x.full_book_path)" data-toggle="modal" data-target="#myModal"><img
                        [src]="x.book_image_path" alt="" /></a></div>

                </td>
                <td>{{x.show_book_msg}}</td>
                <td>{{x.book_name}}</td>
                <td>{{x.isbn_no}}</td>
                <td>{{x.price}}</td>
                <div *ngIf="x.active_book=='I'; then ifblock else elseblock">
                </div>
                <ng-template #ifblock>
                  <td id="active{{x._id}}"><a class="statusCross" (click)="activation(x._id,x.active_book)"><i
                        class="fa fa-times" aria-hidden="true"></i></a>
                  </td>
                </ng-template>
                <ng-template #elseblock>
                  <td id="active{{x._id}}"><a class="statusTick" (click)="activation(x._id,x.active_book)"><i
                        class="fa fa-check" aria-hidden="true"></i></a>
                  </td>
                </ng-template>

                <!-- <td id="active{{x._id}}"><a class="statusTick" (click)="activation(x._id,x.active_book,i)"><i class="fa fa-check" aria-hidden="true"></i></a>
             {{x.active_book}}
             </td> -->
                <td><a class="iconLink"><i class="fa fa-pencil-square" aria-hidden="true"></i></a></td>
              </tr>

            </tbody>
          </table>
          <!--table>
      <tr *ngFor="let x of category">
        <td>{{x.book_name}}</td>
        <td>{{x.isbn_no}}</td>
      </tr>
    </table-->


        </div>
      </div>

    </div>
  </div>

  <!-- use modal -->
  <div id="myModal" class="modal fade" role="dialog">
    <div class="modal-dialog modal-lg">

      <!-- Modal content-->
      <div class="modal-content">
        <div class="modal-header">
          <!-- <button style="margin-right:84%;" type="button" class="close" data-dismiss="modal">&times;</button> -->
        <div id="header-h4">  <h4 class="modal-title" id="bookname"></h4></div>
        </div>
        <div class="modal-body">
         <div id="modal_body_id">
           <embed id="booklink" frameborder="0" width="100%" height="400px"> 
         </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-default" data-dismiss="modal">Close</button>
          </div>
        </div>

      </div>
    </div>
  </div>
  <app-site-footer></app-site-footer>
