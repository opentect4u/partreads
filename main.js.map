<html>

<body>
  <app-site-header></app-site-header>
  <div class="breadcrumb">
    <ul>
      <li><a routerLinkActive="true" routerLink="/publisher/publisher-dashboard">Home</a></li>
      <li>&gt;</li>
      <li>Edit Profile</li>
    </ul>
  </div>
  <div class="bodyContainer">
    <div class="wrapperCustome">
      <app-site-side-bar></app-site-side-bar>
      <div class="col-sm-8 float-left">
        <div class="rightSection">



          <div class="row rowCustome">
            <div class="form-group form_group_custome">
              <div class="col-sm-4 float-left"></div>
              <div class="col-sm-4 float-left">


              </div>

            </div>

            <div class="form-group form_group_custome">
              <div class="col-sm-4 float-left"><input type="text" placeholder="Name (required) " class="form-control" #name [value]="p_name"
                
                >
              </div>
              <div class="col-sm-4 float-left"><input type="text" placeholder="Email (required) " class="form-control" #email 
                [value]="p_email"  readonly></div>
              <div class="col-sm-4 float-left"><input type="text" placeholder=" Phone(required) " class="form-control" #phone [value]="p_phone">
              </div>
            </div>


            
            <div class="form-group form_group_custome">
              <div class="col-sm-6 float-left"><input type="text" class="form-control"
                placeholder="Street/House Number(required)" #street [value]="p_street"></div>
                <div class="col-sm-6 float-left"><input type="text" class="form-control" placeholder="City(required)" #city [value]="p_city"/>
                </div>

             
              
            </div>

            <div class="form-group form_group_custome">
              
              <div class="col-sm-6 float-left"><input type="text" class="form-control"
                  placeholder="Pin code(required)" #pin [value]="p_pin"/></div>
                  <div class="col-sm-6 float-left"><input type="text" class="form-control" placeholder="State(required)" #state [value]="p_state"/>
                  </div>
            </div>
            <div class="form-group form_group_custome">
              <div class="col-sm-6 float-left"><input type="text" class="form-control" placeholder="Country(required)" #country [value]="p_country"/>
              </div>
              <div class="col-sm-6 float-left"><input type="file" id="myfile" name="myfile" class="form-control"
                title="Upload Profile Photo (required)" accept=".jpeg,.jpg,.png" (change)="onChange($event)"></div>
          
            </div>
            <!-- <div class="form-group form_group_custome">
              <div class="col-sm-4 float-left"></div>
              <div class="col-sm-4 float-left"><input type="file" id="myfile" name="myfile" class="form-control"
                  title="Upload Profile Photo (required)" accept=".jpeg" (change)="onChange($event)"></div>
            </div> -->
            <div class="col-sm-12 submitButtn"><input type="submit" class="btn" value="Submit" (click)="send_data(name.value,email.value,phone.value,street.value,city.value,pin.value,state.value,country.value)">
            </div>


          </div>







        </div>



      </div>

    </div>
  </div>

  <app-site-footer></app-site-footer>
</body>

</html>
