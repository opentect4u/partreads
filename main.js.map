<html>

<body>

  <div class="topBanner">
    <div class="wrapper_top">
      <div class="col-sm-3 float-left logo"><a routerLinkActive="true" routerLink="/publisher/publisher-dashboard"><img
            src="/assets/images/logo.png" alt=""></a></div>
      <div class="col-sm-9 float-left">
        <div class="navSectionAfterLog">
          <div class="searchSectionAfterLog"><input class="form-control" type="search"
              placeholder="Search by Name, Author, ISBN" aria-label="Search"><input type="submit" value="Search"></div>

          <div class="loginDetaiTop">

            <ul>
              <li> <a ><i class="fa fa-bell" aria-hidden="true"></i></a></li>
              <li class="thumbnailLi"> <a (click)="show()" class="dropbtn loginThumb"
                  style="background: url({{profile}}) no-repeat center center; background-size: cover;">&nbsp;</a>
                <div id="myDropdown" class="dropdown-content">
                  <a routerLinkActive="true" routerLink="/publisher/edit"><i class="fa fa-user-o"
                      aria-hidden="true"></i> My Profile</a>
                  <a ><i class="fa fa-unlock-alt" aria-hidden="true"></i> Change Password</a>
                  <a (click)="logout()" style="cursor: pointer;"><i class="fa fa-sign-out" aria-hidden="true"></i> Log
                    Out</a>
                </div>
              </li>
            </ul>
          </div>
        </div>

      </div>
    </div>

  </div>
</body>

</html>
