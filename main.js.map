<html class="login" style="background-color:#333">
<body class="login" style="background-color:#333;">

    <div class="form-signin" style="background-color:white">
  <div class="text-center">
      <img src="assets/img/logo.png" alt="Metis Logo">
  </div>
  <hr>
  <div class="tab-content">
      <div id="login" [hidden]="log" class="tab-pane active">
        <p class="text-muted text-center">Enter your ID and password</p>
        <p class="text-center text-danger">{{k}}</p>
        <form [formGroup]="loginForm" #loginform="ngForm" (ngSubmit)="login()">
           
             <br> <div class="form-group clearfix" [ngClass]="{ 'has-error': f.userid.errors }">
                  
                  <div>
                      <input type="text" class="form-control" placeholder="User Id" formControlName="userid" />
                      <div *ngIf=" f.userid.errors" class="help-block">
                            <div *ngIf="f.userid.errors.required">User ID is required</div>
                      </div>
                  </div>
              </div>
              <div class="form-group clearfix" [ngClass]="{ 'has-error':f.password.errors }">
               
                <div>
                    <input type="password" class="form-control" placeholder="Password" formControlName="password"/>
                    <div *ngIf="f.password.errors" class="help-block">
                            <div *ngIf="f.password.errors.required">Password is required</div>
                    </div>
                </div>
              </div>
              <div class="col-xs-12 form-group text-right"><br>
                <button [disabled]="loginform.form.invalid" class="btn btn-lg btn-primary btn-block" type="submit">Sign In</button>
             <br> </div>
            
          </form>
      </div>
      <div id="forgot" [hidden]="forget">
          <form action="index.html">
              <p class="text-muted text-center">Enter your valid e-mail</p>
              <input type="email" placeholder="mail@domain.com" class="form-control">
              <br>
              <button class="btn btn-lg btn-danger btn-block" type="submit">Recover Password</button>
          </form>
      </div>
      <div id="signup" [hidden]="sign"  >
          <form action="index.html">
              <input type="text" placeholder="username" class="form-control top">
              <input type="email" placeholder="mail@domain.com" class="form-control middle">
              <input type="password" placeholder="password" class="form-control middle">
              <input type="password" placeholder="re-password" class="form-control bottom">
              <button class="btn btn-lg btn-success btn-block" type="submit">Register</button>
          </form>
      </div>
  </div>
  <hr>
  <div class="text-center">
      <ul class="list-inline">
          <li><a class="text-muted" (click)="login_show()">Login</a></li>
          <li><a class="text-muted" (click)="forgot_show()">Forgot Password</a></li>
          <li><a class="text-muted" (click)="sign_show()">Signup</a></li>
      </ul>
  </div>
</div>


  <!--jQuery -->
  <script src="assets/lib/jquery/jquery.js"></script>

  <!--Bootstrap -->
  <script src="assets/lib/bootstrap/js/bootstrap.js"></script>



</body>
</html>
