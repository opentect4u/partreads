<html>

<body>
    <div class="topBanner">
        <div class="wrapper_top">
            <div class="col-sm-3 float-left logo"><a href=""><img src="/assets/images/logo.png" alt=""></a></div>
            <div class="col-sm-9 float-left">
                <div class="navSection">
                    <div class="searchSection">
                         <div class="ng-autocomplete">
                            <ng-autocomplete [data]="bookname" [searchKeyword]="keyword" placeholder="Search by name, author, publisher or ISBN"
                                (selected)='selectEvent($event)' (inputChanged)='onChangeSearch($event)'
                                (inputFocused)='onFocused($event)' [itemTemplate]="itemTemplate" historyIdentifier="bookname" 
                                [notFoundTemplate]="notFoundTemplate">
                            </ng-autocomplete>

                            <ng-template #itemTemplate let-item>
                                <div class="item">
                                    <img [src]="item.book_image_path"
                                        style="width:25px;height:25px;align-items: left;border: thick;">
                                    <span [innerHTML]="item.book_name"></span> &nbsp; | &nbsp;
                                    <small>Author: {{item.author_name}}</small> &nbsp; | &nbsp;
                                    <small>Publisher: {{item.publisher_name}}</small> &nbsp; | &nbsp;
                                    <small>ISBN: {{item.isbn_no}}</small>
                                </div>
                            </ng-template>

                            <ng-template #notFoundTemplate let-notFound>
                                <div [innerHTML]="notFound"></div>
                            </ng-template>
                        </div>
                        <input type="submit" value="Search" (click)="show_result()"> 
                        <!-- <input class="form-control" type="search" placeholder="Search by Name, Author, ISBN"
                            aria-label="Search">
                        <input type="submit" value="Search"> -->
                    </div>
                    <ul class="navUl">
                        <li><a routerLinkActive="true" routerLink="/publisher/publishernav"><img
                                    src="/assets/images/publisher.png" alt=""> Publishers</a></li>
                        <li><a href="#"><img src="/assets/images/menu-icon-2.png" alt=""> Lawyers</a></li>
                        <li><a routerLinkActive="true" routerLink="/allbooks">All Books</a></li>
                    </ul>
                    <a routerLinkActive="true" routerLink="/user/userlogin" class="loginBtn">Login</a>
                    <button type="button" class="cart"><i class="fa fa-shopping-cart" aria-hidden="true"></i>
                        <div class="count">0</div>
                    </button>
                </div>

            </div>
        </div>

    </div>
</body>

</html>
