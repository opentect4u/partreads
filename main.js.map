    <app-index-nav-header></app-index-nav-header>
    <div class="breadcrumb">
        <ul>
            <li><a routerLinkActive="true" routerLink="">Home</a></li>
            <li>&gt;</li>
            <li>List of Active Books</li>
        </ul>

    <div class="bodyContainer">
        <div class="wrapperCustome">

            <div class="bookList-col" *ngFor="let i of bookdata">

                    <div class="bookProDetails">
                        <p>{{i.book_name}}<br>
                            {{i.author_name}}</p>
                        <p class="price"><i class="fa fa-inr" aria-hidden="true"></i> {{i.price}}</p>
                        <a class="btnDetails">Read More</a>
                    </div>
                </div>
            </div>
