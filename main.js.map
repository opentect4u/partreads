<div class="topBanner">
    <div class="wrapper_top">
    <div class="col-sm-3 float-left logo"><a routerLinkActive="true" routerLink="/user/user_dashboard"><img src="/assets/images/logo.png" alt=""></a></div>
    <div class="col-sm-9 float-left">
    <div class="navSectionAfterLog">
    <div class="searchSectionAfterLog"><!--input class="form-control" type="search" [value]="search_item" placeholder="Search by Name, Author, ISBN" aria-label="Search" (keypress)="searchval($event)" #srch-->
        <div class="ng-autocomplete">
            <ng-autocomplete 
              [data]="bookname"
              [searchKeyword]="keyword"
              placeholder='Search by name, author, publisher or ISBN'
              (selected)='selectEvent($event)'
              (inputChanged)='onChangeSearch($event)'
              (inputFocused)='onFocused($event)'
              [itemTemplate]="itemTemplate"
              [notFoundTemplate]="notFoundTemplate">                                 
            </ng-autocomplete>
            
            <ng-template #itemTemplate let-item>
                <div class="item">
                    <img [src]="item.book_image_path" style="width:25px;height:25px;align-items: left;border: thick;">
                    <span [innerHTML]="item.book_name" ></span> &nbsp; | &nbsp;
                    <small>Author: {{item.author_name}}</small> &nbsp; | &nbsp;
                    <small>Publisher: {{item.publisher_name}}</small> &nbsp; | &nbsp;
                    <small>ISBN: {{item.isbn_no}}</small>
                </div>
            </ng-template>
            
            <ng-template #notFoundTemplate let-notFound>
            <div [innerHTML]="notFound"></div>
            </ng-template>
            </div>
        <input type="submit" value="Search" (click)="show_result()"></div>	
        
        <div class="loginDetaiTop">
        
        <ul>
        <li> <a><i class="fa fa-bell" aria-hidden="true"></i></a></li>	
        <li class="thumbnailLi"> <a (click)="show()"  class="dropbtn loginThumb" style="background: url({{profile}}) no-repeat center center; background-size: cover;">&nbsp;</a>
            
            <div id="myDropdown" class="dropdown-content">
        <a routerLinkActive="true" routerLink="/user/edit-user"><i class="fa fa-user-o" aria-hidden="true"></i> My Profile</a>
        <a><i class="fa fa-unlock-alt" aria-hidden="true"></i> Change Password</a>
        <a style="cursor: pointer;" (click)="logout()"><i class="fa fa-sign-out" aria-hidden="true"></i> Log Out</a>
      </div>
            
            </li>	
            
        
        </ul>
        </div>
    </div>
            
    </div>
    </div>
    
    </div>
