<app-site-header></app-site-header>
<div class="breadcrumb">
  <ul>
    <li><a routerLinkActive="true" routerLink="/publisher/publisher-dashboard">Home</a></li>
    <li>&gt;</li>
    <li>Edit Profile</li>
  </ul>
</div>
<div class="bodyContainer" >
  
  <div class="wrapperCustome" >
    <app-site-side-bar></app-site-side-bar>
 
    <div class="col-sm-9 float-left" >
      <!-- <div class="spinner-border" *ngIf="loader"></div> -->
      <div class="rightSection" >



        <div class="row rowCustome">
          <div class="form-group form_group_custome">
            <div class="col-sm-4 float-left"></div>
            <div class="col-sm-4 float-left">


            </div>

          </div>

          <div class="form-group form_group_custome">

             <div class="sideBarInf">
               <!-- <button (click)="hide_show()" class="editeBtn"><i
            class="fa fa-edit"></i>Edit</button> -->
        <div class="profilePic"><span *ngIf="profile!=null || profile!='' || profile!=undefined"><img src="{{profile}}" alt="" /></span><span *ngIf="profile==''|| profile==null || profile==undefined" class="text-muted"> <img src="/assets/images/no_dp.png" alt="" /></span></div>
        <!-- <div class="nameInfo">
          <h4>{{p_name}}</h4>
          <a routerLinkActive="true" routerLink="/publisher/edit"><i class="fa fa-envelope"></i><span>{{p_email}}</span><span *ngIf="email==''||email==undefined||email==null" class="text-muted">Add/Edit email</span></a><br>
          <a routerLinkActive="true" routerLink="/publisher/edit"><i class="fa fa-phone"></i><span >{{p_phone}}</span><span *ngIf="p_phone==''||p_phone==undefined||p_phone==null" class="text-muted">Add/Edit phone</span></a><br>
          <a>

            <p routerLinkActive="true" routerLink="/publisher/edit"><i class="fa fa-map-marker" style="font-size:22px" aria-hidden="true"></i><span *ngIf="p_street==''||p_street==undefined||p_street==null || p_city==undefined||p_city==null||p_city==''" class="text-muted">Add/Edit Address</span><span  *ngIf="p_street!=''||p_street!=undefined||p_street!=null || p_city!=undefined||p_city!=null||p_city!=''">{{p_street}} {{p_city}} - {{p_pin}}. <br> {{p_state}}, {{p_country}}</span></p>
          </a>
        </div> -->
      </div>
            <div class="col-sm-4 float-left"><input type="text" placeholder="Name (required) " class="form-control inputfont"
                #name [value]="p_name">
              <span class="text-danger fieldAleart" *ngIf="update&&name.value==''">*Please provide a name</span>
            </div>
            <div class="col-sm-4 float-left"><input type="text" placeholder="Email (required) " class="form-control inputfont"
                #email [value]="p_email" readonly>

            </div>
            <div class="col-sm-4 float-left"><input type="text" placeholder=" Phone(required) " class="form-control inputfont"
                #phone [value]="p_phone">
              <span class="text-danger fieldAleart" *ngIf="update&&phone.value==''">*Please provide phone no.</span>
            </div>
          </div>



          <div class="form-group form_group_custome">
            <div class="col-sm-6 float-left"><input type="text" class="form-control inputfont"
                placeholder="Street/House Number(required)" #street [value]="p_street">
              <span class="text-danger fieldAleart" *ngIf="update&&street.value==''">*Please provide street</span>
            </div>
            <div class="col-sm-6 float-left"><input type="text" class="form-control inputfont" placeholder="City(required)" #city
                [value]="p_city" />
              <span class="text-danger fieldAleart" *ngIf="update&&city.value==''">*Please provide city</span>
            </div>



          </div>

          <div class="form-group form_group_custome">

            <div class="col-sm-6 float-left"><input type="text" class="form-control inputfont" placeholder="Pin code(required)"
                #pin [value]="p_pin" /><span class="text-danger fieldAleart" *ngIf="update&&pin.value==''">*Please provide
                pincode</span></div>
            <div class="col-sm-6 float-left"><input type="text" class="form-control inputfont" placeholder="State(required)"
                #state [value]="p_state" />
              <span class="text-danger fieldAleart" *ngIf="update&&state.value==''">*Please provide state</span>
            </div>
          </div>
          <div class="form-group form_group_custome">
            <div class="col-sm-6 float-left"><input type="text" class="form-control inputfont" placeholder="Country(required)"
                #country [value]="p_country" />
              <span class="text-danger fieldAleart"  *ngIf="update&&country.value==''">*Please provide country</span>
            </div>
            <div class="col-sm-6 float-left"><input type="file" id="myfile" name="myfile" class="form-control inputfont"
                title="Upload Profile Photo (required)" accept=".jpeg,.jpg,.png" (change)="onChange($event)"></div>

          </div>



          <div class="form-group form_group_custome">
            <div class="col-sm-6 float-left">
             <select class="form-control form-select" [(ngModel)]="Bank_Name">
               <option value="">Select Bank</option>
               <option value="Allahabad Bank">Allahabad Bank</option>
               <option value="Andhra Bank">Andhra Bank</option>
               <option value="Axis Bank">Axis Bank</option>
               <option value="Bank of Bahrain and Kuwait">Bank of Bahrain and Kuwait</option>
               <option value="Bank of Baroda - Corporate Banking">Bank of Baroda - Corporate Banking</option>
               <option value="Bank of Baroda - Retail Banking">Bank of Baroda - Retail Banking</option>
               <option value="Bank of India">Bank of India</option>
               <option value="Bank of Maharashtra">Bank of Maharashtra</option>
               <option value="Canara Bank">Canara Bank</option>
               <option value="Central Bank of India">Central Bank of India</option>
               <option value="City Union Bank">City Union Bank</option>
               <option value="Corporation Bank">Corporation Bank</option>
               <option value="Deutsche Bank">Deutsche Bank</option>
               <option value="Development Credit Bank">Development Credit Bank</option>
               <option value="Dhanlaxmi Bank">Dhanlaxmi Bank</option>
               <option value="Federal Bank">Federal Bank</option>
               <option value="IDBI Bank">IDBI Bank</option>
               <option value="Indian Bank">Indian Bank</option>
               <option value="Indian Overseas Bank">Indian Overseas Bank</option>
               <option value="IndusInd Bank">IndusInd Bank</option>
               <option value="ING Vysya Bank">ING Vysya Bank</option>
               <option value="Jammu and Kashmir Bank">Jammu and Kashmir Bank</option>
               <option value=" Karnataka Bank Ltd"> Karnataka Bank Ltd</option>
               <option value="Karur Vysya Bank">Karur Vysya Bank</option>
               <option value="Kotak Bank">Kotak Bank</option>
               <option value="Laxmi Vilas Bank">Laxmi Vilas Bank</option>
               <option value="Oriental Bank of Commerce">Oriental Bank of Commerce</option>
               <option value="Punjab National Bank - Corporate Banking">Punjab National Bank - Corporate Banking</option>
               <option value="State Bank of India">State Bank of India</option>
               <option value="UCO Bank">UCO Bank</option>
               <option value="Union Bank of India">Union Bank of India</option>
               <option value="United Bank of India">United Bank of India</option>
               </select>
            </div>
            <div class="col-sm-6 float-left">
              <input type="text" class="form-control inputfont" placeholder="IFSC Code" [(ngModel)]="IFSC_Code"/>
              </div>
          </div>

          <div class="form-group form_group_custome">
            <div class="col-sm-6 float-left">
              <input type="text" class="form-control inputfont" placeholder="Bank Account No" [(ngModel)]="bank_acc"/>
            </div>
            <div class="col-sm-6 float-left">
              <input type="text" class="form-control inputfont" placeholder="Confirm Bank Account No" [(ngModel)]="conf_bank_acc"/>
              </div>
          </div>
           <div class="form-group form_group_custome">
            <div class="col-sm-6 float-left">
              <input type="text" class="form-control inputfont" placeholder="GSTIN" [(ngModel)]="gst_no"/>
              </div>
          </div>

          <div class="book_loadMain" [hidden]="!spin_show">

            <div class="loader loader-1">
                <div class="loader-outter"></div>
                <div class="loader-inner"></div>
              </div>
            </div>	 
          <!-- <div class="form-group form_group_custome">
              <div class="col-sm-4 float-left"></div>
              <div class="col-sm-4 float-left"><input type="file" id="myfile" name="myfile" class="form-control"
                  title="Upload Profile Photo (required)" accept=".jpeg" (change)="onChange($event)"></div>
            </div> -->
          <div class="col-sm-12 submitButtn"><input [disabled]="spin_show" type="submit" class="btn" value="Submit"
              (click)="send_data(name.value,email.value,phone.value,street.value,city.value,pin.value,state.value,country.value)"
              data-toggle="modal" data-target="#myModal">
            <!-- <div class="spinner-border" [hidden]="!spin_show"></div> -->
               
    




          </div>


        </div>







      </div>



    </div>
    <br clear="all">

  </div>
</div>
<!-- modal -->
<div id="myModal" class="modal" role="dialog">

  <div class="modal-dialog" [ngClass]="modal_msg=='Wrong format!!'? 'modal-sm':'modal-md'">
  <div class="modal-content" id="cont">

    <p class="inputfont ml-3">{{modal_msg}}</p>

    <div class="modal-footer">
      <button type="button" class="btn button-no" data-dismiss="modal"
        *ngIf="modal_msg!='One or more fields may be empty.'&& modal_msg!='Wrong format!!'"
        (click)="modal_close_fun()">Close</button>
      <button type="button" class="btn button-yes" data-dismiss="modal"
        *ngIf="modal_msg=='One or more fields may be empty.'|| modal_msg=='Wrong format!!'"
        (click)="modal_close_funtry()">Try Again</button>

    </div>
  </div>
  </div>
</div>

<app-site-footer></app-site-footer>
