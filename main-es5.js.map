<!--Are you sure (Modal)-->
<div class="modal fade" id="myModal" role="dialog">
  <div class="modal-dialog">
  
    <!-- Modal content-->
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="close" data-dismiss="modal">&times;</button>
        <!-- <h4 class="modal-title">Modal Header</h4> -->
      </div>
      <div class="modal-body">
        <p class="p">Are you sure you want to log out?</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn admin-button ok_btn" data-dismiss="modal">Cancel</button>
        <button type="button" class="btn admin-button" data-dismiss="modal" (click)="logout()">OK</button>
      </div>
    </div>
    
  </div>
</div>
