<div class="bodyContainer">
  <div class="wrapperCustome">
    <app-usersidebar></app-usersidebar>
    
    <div class="col-sm-9 float-left" >
      
    
      <div class="rightSection">



        <div class="row rowCustome">
          <div class="form-group form_group_custome">
            <div class="col-sm-4 float-left"></div>
            <div class="col-sm-4 float-left">


            </div>

          </div>

          <div class="form-group form_group_custome">





            
 <div class="sideBarInf">
   <!-- <button (click)="hide_show()" class="editeBtn"><i
          class="fa fa-edit"></i>Edit</button> -->
      <div class="profilePic">
        <span *ngIf="profile!=null || profile!='' || profile!=undefined" >
        <img [src]="profile" alt="" />
        <!-- <div class="overlayIcon">
          <a class="icon" (click)="make_empty()">
         <i class="fa fa-times" aria-hidden="true"></i>
          </a>
          </div> -->
      </span>
     
        <span *ngIf="profile==''|| profile==null || profile==undefined" class="text-muted"> <img src="/assets/images/no_dp.png" alt="" />
        </span></div>
      <!-- <div class="nameInfo">
        <h4>{{p_name}}</h4>
        <a routerLinkActive="true" routerLink="/user/edit-user"><i class="fa fa-envelope"></i><span>{{p_email}}</span><span *ngIf="email==''||email==undefined||email==null" >Add/Edit email</span></a><br>
        <a routerLinkActive="true" routerLink="/user/edit-user"><i class="fa fa-phone"></i><span >{{p_phone}}</span><span *ngIf="p_phone==''||p_phone==undefined||p_phone==null" class="text-muted">Add/Edit phone</span></a><br>
        <a routerLinkActive="true" routerLink="/user/edit-user">

          <p ><i class="fa fa-map-marker" style="font-size:22px" aria-hidden="true"></i><span *ngIf="p_street==''||p_street==undefined||p_street==null || p_city==undefined||p_city==null||p_city==''" class="text-muted">Add/Edit Address</span><span  *ngIf="p_street!=''||p_street!=undefined||p_street!=null || p_city!=undefined||p_city!=null||p_city!=''">{{p_street}} {{p_city}} - {{p_pin}}. <br> {{p_state}}, {{p_country}}</span></p>
        </a>
      </div> -->
    </div>


              <div  class="col-sm-4 float-left"><input type="text" placeholder="Name (required) " class="form-control inputfont"
                #name [value]="p_name"><span class="text-danger fieldAleart" *ngIf="update&&name.value==''">*Please provide a
                name.</span>
            </div>
            <div class="col-sm-4 float-left"><input type="text" placeholder="Email (required) " class="form-control inputfont"
                #email [value]="p_email" readonly></div>
            <div class="col-sm-4 float-left"><input type="text" placeholder=" Phone(required) " class="form-control inputfont"
                (keypress)="preventNonNumericalInput($event)" #phone [value]="p_phone"><span  class="text-danger fieldAleart"
                *ngIf="update&&phone.value==''">*Please provide phone no.</span>
            </div>
          



          <div class="form-group form_group_custome pt-4">
            <div class="col-sm-6 float-left"><input type="text" class="form-control inputfont"
                placeholder="Street/House Number(required)" #street [value]="p_street"><span  class="text-danger fieldAleart "
                *ngIf="update&&street.value==''">*Please provide street</span></div>
            <div class="col-sm-6 float-left"><input type="text" class="form-control inputfont" placeholder="City(required)" #city
                [value]="p_city" /><span  class="text-danger fieldAleart" *ngIf="update&&city.value==''">*Please provide
                city</span>
            </div>



          </div>

          <div class="form-group form_group_custome">

            <div class="col-sm-6 float-left"><input type="text" class="form-control inputfont" placeholder="Pin code(required)"
                #pin [value]="p_pin" /><span  class="text-danger fieldAleart" *ngIf="update&&pin.value==''">*Please provide
                pincode</span></div>
            <div class="col-sm-6 float-left"><input type="text" class="form-control inputfont" placeholder="State(required)"
                #state [value]="p_state" /><span  class="text-danger fieldAleart" *ngIf="update&&state.value==''">*Please provide
                state</span>
            </div>
          </div>
          <div  class="form-group form_group_custome">
            <div class="col-sm-6 float-left"><input type="text" class="form-control inputfont" placeholder="Country(required)"
                #country [value]="p_country" /><span  class="text-danger fieldAleart" *ngIf="update&&country.value==''">*Please
                provide country</span>
            </div>

            <div class="col-sm-6 float-left"><input type="file" id="myfile" name="myfile" class="form-control inputfont"
                title="Upload Profile Photo (required)" accept=".jpeg,.jpg,.png" (change)="onChange($event)">

            </div>

          </div>
           <!-- <hr/> -->
           <!-- <h2 (click)="clicktoexpand()" class="customText">Whether you are
           </h2> -->
          <div class="form-group form_group_custome" id="spanCollapse">
            <!-- <div class="row"> -->
              <div class="col-sm-6">
                <span class="customSpan">Whether you are</span><br/>
                <mat-radio-group>
                <mat-radio-button class="example-radio-button" [checked]="Clg" id="std" color="primary" value="S" (change)="showValue($event)">Student/Academician</mat-radio-button>
                <mat-radio-button class="example-radio-butto"  [checked]="Corporate" id="corporate" color="primary" (change)="showValue($event)" value="C">Corporate Counsel</mat-radio-button>
                <mat-radio-button class="example-radio-button" [checked]="Advocate" id="advocate" (change)="showValue($event)"  color="primary" value="A">Advocate</mat-radio-button>
              </mat-radio-group>
               </div>
               <div class="col-sm-6">
                <input type="text" hidden id="colg" class="form-control inputfont" placeholder="College/University"/>
                <input type="text" hidden class="form-control inputfont" id="com_name" placeholder="Name Of Company"/>
                <input type="text" hidden class="form-control inputfont" id="prac_area" placeholder="Practice Area"/>
              </div>
            <!-- </div> -->

            <!-- <div class="row mt-1">
              <div class="col-2"></div>
             
            </div> -->

          
          </div>


          <!-- <div class="book_loadMain" [hidden]="!spin_show">

            <div class="loader loader-1">
                <div class="loader-outter"></div>
                <div class="loader-inner"></div>
              </div>
            </div>	 -->
          <div id="cover-spin" [hidden]="!spin_show"></div>

          <!-- </div>  -->
        </div>
          <div class="col-sm-12 submitButtn mt-2"><input [disabled]="spin_show" type="submit" class="btn" value="Submit"
              (click)="send_data(name.value,email.value,phone.value,street.value,city.value,pin.value,state.value,country.value)">
        </div>
        </div>
      </div>
    </div>
    <br clear="all">

  </div>
</div>
<div id="myModal" class="modal" role="dialog">

  <div class="modal-dialog" [ngClass]="modal_msg=='Wrong format!!'? 'modal-sm': 'modal-md'">
    <div class="modal-content" id="cont">

      <p class="inputfont ml-3">{{modal_msg}}</p>

      <div class="modal-footer">
        <button type="button" class="btn button-no" data-dismiss="modal"
          *ngIf="modal_msg!='One or more fields may be empty.'&& modal_msg!='Wrong format!!'"
          (click)="modal_close_fun()">Close</button>
        <button type="button" class="btn button-yes" data-dismiss="modal"
          *ngIf="modal_msg=='One or more fields may be empty.'||modal_msg=='Wrong format!!'"
          (click)="modal_close_funtry()">Try Again</button>

      </div>
    </div>
  </div>
</div>
<app-site-footer></app-site-footer>
