<app-publogregheader></app-publogregheader>



<div class="bodyContainerLogin">

  <div class="loginWraper" style="margin-top:-8.5%;"
    >

    <div @fade class="alert alertLogin" id="uploaded" [hidden]="alert_show_okay">
      <span class="closebtn_1" (click)="close_alert()">&times;</span>
      {{invalid}}

    </div>
    <div @fade class="alert1 alertLogin" id="uploaded_1" [hidden]="alert_show_wrong">
      <span class="closebtn" (click)="close_alert_1()">&times;</span>
      {{invalid}}

    </div>
    <div class="col-sm-12">
      <h1>Publisher Sign Up</h1>
      <form #userForm="ngForm">
        <div class="form-group">
          <label class="inputWraper"><i class="fa fa-user" aria-hidden="true"></i>
            <input id="p_nm" type="text" class="form-control" placeholder="Name" name="pname" #pname required></label>
            <span class="text-danger fieldAleart">{{check_name}}</span>
        </div>
        <div class="form-group">
          <label class="inputWraper"><i class="fa fa-envelope-o" aria-hidden="true"></i>
            <input id="p_em" type="email" class="form-control" placeholder="Email" #pemail
              (change)="check_email_validity($event)"></label>
              <span class="text-danger fieldAleart">{{check_email}}</span>
                <span class="text-danger fieldAleart">{{confirm_email}}</span>
        </div>
         
        <div class="form-group">
          <label class="inputWraper"><i class="fa fa-user" aria-hidden="true"></i>
            <input id="p_phone" type="text" class="form-control" placeholder="Mobile number" name="phone" #phone required></label>
            <span class="text-danger fieldAleart">{{mobile_number}}</span>
        </div>
      




        <div class="form-group">
          <label class="inputWraper"><i class="fa fa-lock" aria-hidden="true"></i>
            <input id="passwd" type="password" class="form-control" placeholder="Password" #ppwd required
              (change)="show_input($event)" (keyup)="check_valid_pass($event)"><span id="iconshow" style="z-index: 9999;
                position: absolute;
                top: 5%;
                right: 40px;" class="p-viewer">
              <i id="eye" class="fa fa-eye-slash" aria-hidden="true" (click)="show_hide_pass()"></i>
            </span></label>
            <span class="text-danger fieldAleart">{{check_password}}</span>
            <span class="text-danger fieldAleart">{{pass_message}}</span>
        </div>

        <div class="form-group">
          <label class="inputWraper"><i class="fa fa-lock" aria-hidden="true"></i>
            <input id="conf_passwd" type="password" class="form-control" placeholder="Confirm Password" required
              (keyup)="confirm_password($event)"><span id="iconshow" style="z-index: 9999;
                position: absolute;
                top: 5%;
                right: 40px;" class="p-viewer">
              <i id="eye_conf" class="fa fa-eye-slash" aria-hidden="true" (click)="show_hide_conf()"></i>
            </span></label>
            <span class="text-danger fieldAleart">{{conf_message}}</span>
        </div>

        <div class="checkBoxCustomeMain">
          <label class="checkBoxCustom">
            <input type="checkbox" checked="checked" (change)="check_terms_and_condition($event)">
            <span class="checkmarkText"></span>
          </label>
          <a  type='button' data-toggle="modal" data-target="#terms_condition">Terms &amp; Condition Apply</a>
        </div>

        <div class="form-group">

          <!-- <input type="submit" [disabled]='disabled_button' class="btn btnRed widthFull" (click)="show(pname.value,pemail.value,ppwd.value,phone.value)"
            value="Sign up now"> -->
            <button [disabled]='disabled_button' class="btn btnRed widthFull" (click)="show(pname.value,pemail.value,ppwd.value,phone.value)"
            > <div [hidden]="!show_loader">
              Sign up now 
            </div> <div [hidden]="show_loader" class="spinner-border text-light"></div> </button>
        </div>
      </form>

    </div>
    <br clear="all">
  </div>

</div>

<app-site-footer></app-site-footer>


<div id="snackbar">{{this.caps_lock}}</div>


<div class="modal fade" id="terms_condition"  role="dialog">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <!-- Modal Header -->
      <div class="modal-header">
        <h4 class="modal-title">Terms & Conditions</h4>
        <button type="button" class="close" data-dismiss="modal">&times;</button>
      </div>

      <!-- Modal body -->
      <div class="modal-body">
        Modal body..
      </div>

      <!-- Modal footer -->
      <div class="modal-footer">
        <button type="button" class="btn btn-danger" data-dismiss="modal">Close</button>
      </div>

    </div>
  </div>
</div>
