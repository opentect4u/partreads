<app-publogregheader></app-publogregheader>



<div class="bodyContainerLogin">

  <div class="loginWraper">

    <div class="col-sm-12">
      <h1>Forgot Password</h1>
      <div class="alert alertLogin" id="uploaded" [hidden]="alert_show">
        <span class="closebtn" (click)="close_alert()">&times;</span>
        {{invalid}}
      </div>

      <div class="success_alert alertLogin" id="uploaded" [hidden]="alert_show_success">
        <span class="closebtn" (click)="close_alert_success()">&times;</span>
        {{invalid}}
      </div>

      <div class="form-group">
        <label class="inputWraper"><i class="fa fa-envelope-o" aria-hidden="true"></i>
          <input type="email" class="form-control" placeholder="Email" #pubemail 
        ></label>
            
      </div>

      <div class="form-group">

        <input type="submit" class="btn btnRed widthFull" (click)="show(pubemail.value)" value="Submit">
      </div>

      
      
    </div>

    <br clear="all">
  </div>

</div>

<app-site-footer></app-site-footer>
