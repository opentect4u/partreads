<div class="bodyContainer">
    <div class="wrapperCustome">
        <app-usersidebar></app-usersidebar>

        <div class="col-sm-9 float-left">
    

            <div class="rightNotification">

                <h1>Notifications</h1>
               
               <!--  <div class="book_loadMain" *ngIf="loader">

                    <div class="loader loader-1">
                        <div class="loader-outter"></div>
                        <div class="loader-inner"></div>
                      </div>
               </div>	 -->
               <div id="cover-spin" *ngIf="loader"></div>
             
              
                 <mat-form-field >
                     <mat-label>Search</mat-label>
                     <input matInput (keyup)="applyFilter($event)" placeholder="Search Notifications" #input >
                   </mat-form-field>
                   
                 
                 
                   <div class="mat-elevation-z8" >
                     <table mat-table [dataSource]="dataSource" matSort>
                        <ng-container matColumnDef="Image">
                            <th mat-header-cell *matHeaderCellDef [hidden]="true"></th>
                            <td mat-cell *matCellDef="let row" style="text-align:center;width: 20px;padding-top: 22px;">
                           
                                       <div  *ngIf="row.subject=='BookUpload'" class="Table_profilePic">
                                        <img src="{{row.from_user_image}}" class="" alt="Cinque Terre" > 
                                       </div>
                                       <div  *ngIf="row.subject=='LinkShare'" class="Table_profilePic">
                                        <img src="{{row.from_user_image}}" class="" alt="Cinque Terre" > 
                                       </div>
                                       <div  *ngIf="row.subject=='BuyBookPages'" class="book_pic" >
                                        
                                        <img src="{{row.book_image}}" class="" alt="Cinque Terre" > 
                                       </div>
                        
                           </td>
                          </ng-container>
              

                       
                       <ng-container matColumnDef="Notification">
                         <th mat-header-cell *matHeaderCellDef [hidden]="true"></th>
                         <td mat-cell *matCellDef="let row" style="text-align:left;word-spacing: 0px;font-size: 17px;">
                            <div *ngIf="row.subject=='BookUpload'; then ifblock"></div>
                            <ng-template #ifblock>
                                 <td>
                                    <div class="P_Tag" (click)="got_book_details_page(row.book_id,row.publisher_id)">
                                      <p>{{row.publisher_name}} has
                                      {{msg}}
                                      {{row.book_name}}.</p>
                                    </div>
                                </td>
                                    
                        
                            </ng-template>
                            <div *ngIf="row.subject=='BuyBookPages'; then elseblock"></div>
                            <ng-template #elseblock>
                                 <td>
                                    <div class="P_Tag" (click)="got_book_details_page(row.book_id,row.publisher_id)">
                                      <p>Transaction for {{row.book_name}}  <span *ngIf="row.body!=''">( <i>Pages: {{row.body}} </i>) </span>  has been successfully made.                      
</p>
                                    </div>
                                </td>
                                    
                        
                            </ng-template>
                            <div *ngIf="row.subject=='LinkShare'; then shareblock"></div>
                            <ng-template #shareblock>
                                <td>
                                   <div class="P_Tag" (click)="got_book_details_page(row.book_id,row.publisher_id)">
                                     <p> {{row.publisher_name}} has shared the link of {{row.book_name}}  <img src="{{row.book_image}}" height="30" width="25" alt="">  ( <i>Pages: {{row.body}} </i>) .                      
</p>
                                   </div>
                               </td>
                                   
                       
                           </ng-template>
                        </td>
                       </ng-container>
                      

                      
                   
                 
                       <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                       <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                   
                       <!-- Row shown when there is no matching data. -->
                       <tr class="mat-row" *matNoDataRow [hidden]="row">
                         <td class="mat-cell" colspan="4">Data Not Found</td>
                       </tr>
                     </table>
                   
                     <mat-paginator [pageSizeOptions]="[20, 40, 80,100]" showFirstLastButtons ></mat-paginator>
                   </div>
                  
                 
                 
                 
                 
             








            </div>

        </div>
        <br clear="all">
    </div>

</div>

<app-site-footer></app-site-footer>
