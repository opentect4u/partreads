 <div class="bodyContainer"  >
   <div class="wrapperCustome" >
   
       <app-usersidebar></app-usersidebar>
     <div class="col-sm-9 float-right" >
    
      <div class="row">
       <div class="dashBoardFlex">
         <div class="col-sm-12 float-left">
          <div class="dashBoardGraph">
            <div class="titleSec">
              <div id="cover-spin" *ngIf="load"></div>
              <form #logForm="ngForm" (ngSubmit)="ApplyCoupon(logForm)">
                <div class="col-sm-6 mb-3">
                  <!-- <label>Coupon Code</label> -->
                  <!-- <input class="form-control" type="text" name="coupon_code" #coupon_code="ngModel" ngModel required (keyup)="omit_special_char($event)"/> -->
                  <mat-form-field appearance="outline">
                    <mat-label>Coupon Code</mat-label>
                    <input matInput type="text" name="coupon_code" #coupon_code="ngModel" ngModel required style="text-transform:uppercase" (keypress)="omit_special_char($event)">
                    <mat-error *ngIf="coupon_code.errors?.required && (coupon_code.touched || coupon_code.dirty)" >
                      *Please Provide Coupon Code
                    </mat-error>
                  </mat-form-field>
                  
                </div>
                <div class="col-sm-6">
                  <input type="submit" value="Apply Coupon" class="finalSubmitButton" style="margin-top: 10px!important;float: left;" [disabled]="logForm.invalid"/>
                </div>
               </form>
            </div>
          </div>
         </div>

  
       </div>

        <div class="dashBoardFlex">
      <div class="col-sm-6 float-left">
      <div class="dashBoardGraph">
      <div class="titleSec">
      <h2>Purchase History</h2>
      

      </div> 
      <!-- <div id="container" class="mt-5" style="width:100%;height:100%;"> -->
      <canvas id="pie2" style="width:100%;height:50vh;"></canvas>
      <!-- </div> -->
      </div>
      </div>
      <div class="col-sm-6 float-left">
      <div class="dashBoardGraph">
        <div class="titleSec">
      <h2>Payment History</h2>

      </div>
      <canvas id="pie3" style="width:100%;height:50vh;"></canvas></div>
      </div>
    </div>

    <div class="dashBoardFlex">

      <div class="col-sm-6 float-left">
      <div class="dashBoardGraph">
      <div class="titleSec">
      
      <h2>Recently Viewed <span> (five recent entries) </span></h2>

      </div>
     

      <ul class="showlist list-group listOfBookDash" >


      <div *ngIf="show_notif" class="loader"></div>



      <li *ngFor="let x of recent_visit" style="cursor: pointer;" (click)="go_to_book(x.book_id,x.publisher_id)" ><i class="fa fa-angle-right" aria-hidden="true"></i>
      <!-- {{this.topbooks.message[0].book_details.book_name}} -->
      {{x.book_name}} 
      <span> 
      ({{x.created_at | date:'medium'}})           
      </span>
      </li>
      <!-- <li class="list-group-item"><i class="fa fa-angle-right" aria-hidden="true"></i> -->
      <!-- {{this.topbooks.message[1].book_details.book_name}} -->
      <!-- </li> -->
      <!-- <li class="list-group-item"><i class="fa fa-angle-right" aria-hidden="true"></i> -->

      <!-- <li class="list-group-item"><i class="fa fa-angle-right" aria-hidden="true"></i> -->

      <!-- </li> -->
      <!-- <li class="list-group-item"><i class="fa fa-angle-right" aria-hidden="true"></i> -->
      <!-- {{this.topbooks.message[4].book_details.book_name}} -->
      <!-- </li> -->

      </ul>
     
      </div>
      </div>

      <div class="col-sm-6 float-left">
      <div class="dashBoardGraph">
        <div class="titleSec">
      <h2>Recently Shared <span> (five recent entries) </span></h2>
    </div>

      <ul class="showlist list-group listOfBookDash" >
      <div *ngIf="show_notif" class="loader"></div>

      <li *ngFor="let x of recent_share"><i class="fa fa-angle-right" aria-hidden="true"></i>
      <!-- {{this.topbooks.message[0].book_details.book_name}} -->
      {{x.book_name}}
      <!-- <small class="text-muted"> 
      ({{x.created_at | date:'medium'}})           
      </small> -->
      </li>
      <!-- <li class="list-group-item"><i class="fa fa-angle-right" aria-hidden="true"></i> -->

      <!-- </li> -->

      <!-- </li> -->

      </ul>
      
      <!-- <div class="col-sm-12"><img src="/assets/images/add.jpg" alt="" /></div> -->
      </div>






      </div>
    </div>


      </div>

      
    </div>
 <br clear="all">
 </div></div>
 <div class="modal fade" id="delmodal" role="dialog">
   <div class="modal-dialog">
   
     <!-- Modal content-->
     <div class="modal-content">
       <div class="modal-header">
         <button type="button" class="close" data-dismiss="modal">&times;</button>
         <!-- <h4 class="modal-title">Modal Header</h4> -->
       </div>
       <div class="modal-body">
         <p class="p">Are you sure you want to delete the item from cart?</p>
       </div>
       <div class="modal-footer">
         <button type="button" class="btn button-no" data-dismiss="modal">Cancel</button>
         <button type="button" class="btn button-yes" data-dismiss="modal" >OK</button>
       </div>
     </div>
     
   </div>
 </div>
